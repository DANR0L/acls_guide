name: acls_guide
description: Guia Clínico Interativo ACLS 2025 — AHA Guidelines para médicos intensivistas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Shared Preferences (settings)
  shared_preferences: ^2.3.2

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.0

  # Icons extras
  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/ecg/
    - assets/audio/
